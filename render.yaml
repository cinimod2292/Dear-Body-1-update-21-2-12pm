services:
  - type: web
    name: dear-body-backend
    env: node
    rootDir: backend
    buildCommand: npm ci && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /ping
    envVars:
      # ── Required ──────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      # Supabase connection POOLER URL — used by the app at runtime.
      # Get this from: Supabase dashboard → Project Settings → Database → Connection Pooling
      # Use "Session mode" (port 5432) or "Transaction mode" (port 6543, add ?pgbouncer=true)
      # Format: postgresql://postgres.[project-ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres?sslmode=require
      - key: DATABASE_URL
        sync: false
      # Supabase DIRECT connection URL — used only by prisma migrate deploy in the build step.
      # This is the original db.[project-ref].supabase.co:5432 URL you copied from Cloud Run.
      # Format: postgresql://postgres:[password]@db.[project-ref].supabase.co:5432/postgres?sslmode=require
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: EMAIL_FROM
        sync: false          # e.g. hello@yourdomain.com
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true
      # ── CORS ──────────────────────────────────────────────────────────────
      # Comma-separated list of allowed frontend origins, e.g.:
      #   https://your-shop.vercel.app,https://yourdomain.com
      - key: CORS_ORIGIN
        sync: false
      # ── Maintenance mode ──────────────────────────────────────────────────
      # Set to "true" to return 503 on all API routes (except /ping and /health)
      - key: MAINTENANCE_MODE
        value: "false"
      # ── Optional – uncomment and fill in as needed ────────────────────────
      # - key: UPLOAD_PROVIDER
      #   value: cloudflare-r2
      # - key: UPLOAD_BUCKET
      #   sync: false
      # - key: UPLOAD_ENDPOINT
      #   sync: false
      # - key: UPLOAD_ACCESS_KEY_ID
      #   sync: false
      # - key: UPLOAD_SECRET_ACCESS_KEY
      #   sync: false
      # - key: UPLOAD_PUBLIC_BASE_URL
      #   sync: false
      # - key: EMAIL_PROVIDER
      #   value: resend
      # - key: RESEND_API_KEY
      #   sync: false
      # - key: SETUP_TOKEN
      #   generateValue: true
      # - key: PAYMENTS_ENCRYPTION_SECRET
      #   generateValue: true
      # - key: STORAGE_ENCRYPTION_SECRET
      #   generateValue: true
